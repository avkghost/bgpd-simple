! BGP Configuration Example with Network Interfaces
! This file demonstrates typical BGP configuration with interface management
!
! Build and run:
!   cmake --build build/
!   ./build/bgpd -f conf/bgpd-interfaces.conf
!
! Connect and test:
!   nc -U /var/run/bgpd.sock
!   bgpd# show interface
!   bgpd# write config /tmp/bgpd-export.conf
!

! ───────────────────────────────────────────────────────────────────────────────
! Static Routes (Global Routing Table)
! ───────────────────────────────────────────────────────────────────────────────

ip route 10.0.0.0/8 via 192.168.1.1
ip route 192.168.0.0/16 via 192.168.1.1
!

! ───────────────────────────────────────────────────────────────────────────────
! Prefix Lists for Inbound Route Filtering
! ───────────────────────────────────────────────────────────────────────────────

ip prefix-list PL-DEFAULT seq 10 permit 0.0.0.0/0 le 32
ip prefix-list PL-PRIVATE seq 10 deny 10.0.0.0/8 le 32
ip prefix-list PL-PRIVATE seq 20 deny 172.16.0.0/12 le 32
ip prefix-list PL-PRIVATE seq 30 deny 192.168.0.0/16 le 32
ip prefix-list PL-PRIVATE seq 40 permit 0.0.0.0/0 le 32
!

ip prefix-list PL-CUSTOMER seq 10 permit 203.0.113.0/24
ip prefix-list PL-CUSTOMER seq 20 permit 198.51.100.0/24
!

! ───────────────────────────────────────────────────────────────────────────────
! Route Maps for Policy-Based Routing
! ───────────────────────────────────────────────────────────────────────────────

route-map RM-INBOUND permit 10
  match ip address prefix-list PL-DEFAULT
  set local-preference 200
!

route-map RM-INBOUND permit 20
  set community 65000:1 additive
!

route-map RM-OUTBOUND permit 10
  set community 65000:1 additive
!

route-map RM-CUSTOMER permit 10
  match ip address prefix-list PL-CUSTOMER
  set local-preference 300
!

! ───────────────────────────────────────────────────────────────────────────────
! BGP Router Configuration
! ───────────────────────────────────────────────────────────────────────────────

router bgp 65000
  bgp router-id 10.0.0.7
  bgp cluster-id 10.0.0.7
  bgp timers 60 180

  ! ─────────────────────────────────────────────────────────────────────────
  ! iBGP Peer: Route Reflector Client
  ! ─────────────────────────────────────────────────────────────────────────

  neighbor 192.168.1.200 remote-as 65000
  neighbor 192.168.1.200 description "Core Router 1 - RR Client"
  neighbor 192.168.1.200 timers 60 180
  neighbor 192.168.1.200 route-reflector-client
  neighbor 192.168.1.200 route-map RM-INBOUND in
  neighbor 192.168.1.200 route-map RM-OUTBOUND out

  ! ─────────────────────────────────────────────────────────────────────────
  ! eBGP Peer: Customer
  ! ─────────────────────────────────────────────────────────────────────────

  neighbor 192.168.2.100 remote-as 65001
  neighbor 192.168.2.100 description "Customer AS65001"
  neighbor 192.168.2.100 timers 60 180
  neighbor 192.168.2.100 route-map RM-CUSTOMER in
  neighbor 192.168.2.100 route-map RM-OUTBOUND out

  ! ─────────────────────────────────────────────────────────────────────────
  ! IPv4 Unicast Address Family
  ! ─────────────────────────────────────────────────────────────────────────

  address-family ipv4 unicast
    network 192.0.2.0/24
    network 192.0.3.0/24
    network 198.51.100.0/24
    neighbor 192.168.1.200 activate
    neighbor 192.168.2.100 activate
  exit-address-family

  ! ─────────────────────────────────────────────────────────────────────────
  ! IPv6 Unicast Address Family
  ! ─────────────────────────────────────────────────────────────────────────

  address-family ipv6 unicast
    network 2001:db8::/32
    network 2001:db8:1::/48
    neighbor 192.168.1.200 activate
    neighbor 192.168.2.100 activate
  exit-address-family

  ! ─────────────────────────────────────────────────────────────────────────
  ! EVPN (L2VPN EVPN) Address Family - for VXLAN and Overlay Networks
  ! ─────────────────────────────────────────────────────────────────────────

  address-family l2vpn evpn
    neighbor 192.168.1.200 activate
  exit-address-family

!

! ═════════════════════════════════════════════════════════════════════════════
! Network Interface Configuration (Fully Supported)
! To view interfaces: bgpd# show interface
! To save config:    bgpd# write config /tmp/bgpd-save.conf
! ═════════════════════════════════════════════════════════════════════════════

interface eth0
  description "Core Link to Router 1"
  ip address 192.168.1.5/24
  ipv6 address 2001:db8:1::5/64
  mtu 1500
  no shutdown
!

interface eth1
  description "Customer Link - AS65001"
  ip address 192.168.2.5/24
  mtu 9000
  no shutdown
!

interface loopback 0
  description "BGP Router ID"
  ip address 10.0.0.7/32
  ipv6 address 2001:db8:ffff::7/128
  no shutdown
!
